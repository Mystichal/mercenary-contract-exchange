name: MCE Contracts Tests

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'

jobs:
  test:
    name: sui move test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          curl -fsSL https://github.com/MystenLabs/sui/releases/download/testnet-v1.35.1/sui-testnet-v1.35.1-ubuntu-x86_64.tgz \
            | tar -xz -C /usr/local/bin/
          sui --version

      - name: Run Move tests
        working-directory: contracts/mercenary-exchange
        run: sui move test
