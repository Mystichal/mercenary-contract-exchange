services:

  # ── MCE Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mce-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env

  # ── MCE Verifier ─────────────────────────────────────────────────────────────
  verifier:
    build:
      context: .
      dockerfile: Dockerfile.verifier
    container_name: mce-verifier
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - frontend
