networks:
  traefik-public:
    external: true

services:

  # ── MCE Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mce-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.mce.rule=Host(`mce.local`)"
      - "traefik.http.routers.mce.entrypoints=web"
      - "traefik.http.services.mce.loadbalancer.server.port=3000"

  # ── MCE Verifier ─────────────────────────────────────────────────────────────
  verifier:
    build:
      context: .
      dockerfile: Dockerfile.verifier
    container_name: mce-verifier
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - traefik-public
    depends_on:
      - frontend
